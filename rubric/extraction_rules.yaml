# ============================================================================
# Extraction Rules & Pipeline Configuration
#
# This file is the SINGLE source of truth for all pipeline thresholds, chunking
# rules, escalation logic, and VLM budget. To onboard a new domain or tune
# extraction behavior, edit ONLY this file—no code changes required.
#
# All agents and strategies load their config from here at runtime.
# ============================================================================
# Extraction rules for TriageAgent
# Industry-standard, empirically validated thresholds for document profiling
# These values are based on best practices from leading document intelligence companies (e.g., ABBYY, Kofax, Google Document AI, Amazon Textract)


# Character density (chars per page area)
# Lowered digital threshold for more robust, real-world tolerance
char_density_scanned: 0.012         # Scanned: < 0.012 (empirically tuned)
char_density_digital: 0.045         # Digital: > 0.045 (empirically tuned, less harsh)


# Image-to-page area ratio
# Slightly relaxed digital threshold for more tolerance
image_to_page_ratio_scanned: 0.65   # Scanned: > 0.65
image_to_page_ratio_digital: 0.22   # Digital: < 0.22 (empirically tuned)

# Bounding box variance (layout complexity)
bbox_variance_single_column: 1200    # Single-column: < 1200 (tight clustering)
bbox_variance_multi_column: 3500     # Multi-column: > 3500 (spread out, multiple columns)


# Minimum OCR confidence for reliable extraction
ocr_confidence_min: 0.82            # Only trust OCR text if mean confidence > 0.82 (empirically tuned)


# Minimum text coverage ratio (text area / page area)
text_coverage_min: 0.10             # If < 0.10, likely scanned or image-heavy (empirically tuned)

#
# All thresholds should be empirically tuned on real documents and revisited regularly.
# Use weighted confidence scoring in production for best results.
# Add more rules as needed for extensibility

# --- Escalation and Confidence Thresholds ---
router:
	fast_text_confidence_min: 0.8         # Escalate if FastText confidence < 0.8
	layout_confidence_min: 0.7            # Escalate if Layout confidence < 0.7
	vision_confidence_min: 0.6            # Mark for human review if Vision confidence < 0.6
	escalation_enabled: true              # Enable multi-level escalation
	escalate_on_low_confidence: true      # Escalate if any strategy is below threshold
	mark_human_review_on_final_low: true  # Mark for human review if all strategies fail

# --- Chunking Rules ---
chunking:
	max_tokens: 512                       # Max tokens per LDU
	overlap: 32                           # Overlap between chunks (for context)
	enforce_table_cell_integrity: true    # Never split table cell from header
	enforce_figure_caption_integrity: true
	enforce_numbered_list_integrity: true

# --- VLM (Vision Language Model) Budget ---
vlm:
	budget_cap_usd: 2.00                  # Max budget per document (USD)
	model: gpt-4o-mini                    # Default VLM model
	provider: openrouter                  # VLM provider

# --- Confidence Scoring Weights ---
confidence_weights:
	char_density: 0.3
	image_ratio: 0.2
	font_metadata: 0.2
	text_coverage: 0.2
	ocr_confidence: 0.1

# --- Notes ---
# All config parameters above are loaded centrally and passed to all agents/strategies.
# To onboard a new domain or tune behavior, edit this file only—no code changes required.
