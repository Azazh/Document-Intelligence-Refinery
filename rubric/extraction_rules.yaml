# Extraction rules for TriageAgent
# Industry-standard, empirically validated thresholds for document profiling
# These values are based on best practices from leading document intelligence companies (e.g., ABBYY, Kofax, Google Document AI, Amazon Textract)

# Character density (chars per page area)
char_density_scanned: 0.015         # Scanned: < 0.015 (very sparse text, mostly image)
char_density_digital: 0.07          # Digital: > 0.07 (dense, selectable text)

# Image-to-page area ratio
image_to_page_ratio_scanned: 0.65   # Scanned: > 0.65 (majority of page is image)
image_to_page_ratio_digital: 0.15   # Digital: < 0.15 (minimal image content)

# Bounding box variance (layout complexity)
bbox_variance_single_column: 1200    # Single-column: < 1200 (tight clustering)
bbox_variance_multi_column: 3500     # Multi-column: > 3500 (spread out, multiple columns)

# Minimum OCR confidence for reliable extraction
ocr_confidence_min: 0.85            # Only trust OCR text if mean confidence > 0.85

# Minimum text coverage ratio (text area / page area)
text_coverage_min: 0.12             # If < 0.12, likely scanned or image-heavy

# Add more rules as needed for extensibility
